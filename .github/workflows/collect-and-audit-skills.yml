name: CollectAndAuditSkills

on:
  # schedule:
  #   - cron: '0 12 * * 0'  # Weekly Sun 12:00 UTC / 21:00 JST / 07:00 EST / 04:00 PST / 13:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Example for Python-based user-defined audit engines:
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      #
      # - name: Install Python audit dependencies
      #   run: pip install -r scripts/audit-requirements.txt
      #
      - name: Collect skills from org repositories
        id: collect
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
        run: npx harbor collect
        # For local development (source repo), use instead:
        # run: pnpm collect

      - name: Audit collected skills
        id: audit
        if: ${{ steps.collect.outcome == 'success' }}
        continue-on-error: true
        env:
          GH_ORG: ${{ vars.GH_ORG }}
        run: npx harbor audit --history-id "${{ steps.collect.outputs.history_id }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update skill catalog and audit report"
            git push
          fi

      - name: Fail when collect reports blocking issues
        if: ${{ steps.collect.outcome != 'success' }}
        run: exit 1

      - name: Fail when audit reports blocking issues
        if: ${{ steps.collect.outcome == 'success' && steps.audit.outcome != 'success' }}
        run: exit 1

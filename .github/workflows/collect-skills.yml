name: CollectSkills

on:
  # schedule:
  #   - cron: '0 12 * * 0'  # Weekly Sun 12:00 UTC / 21:00 JST / 07:00 EST / 04:00 PST / 13:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect skills from org repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
        run: npx harbor collect
        # For local development (source repo), use instead:
        # run: pnpm collect

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update skill catalog"
            git push
          fi

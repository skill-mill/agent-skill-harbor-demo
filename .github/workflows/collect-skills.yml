name: CollectSkills

on:
  # schedule:
  #   - cron: '0 12 * * 0'  # Weekly Sun 12:00 UTC / 21:00 JST / 07:00 EST / 04:00 PST / 13:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      collect_id: ${{ steps.collect_id.outputs.collect_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install collector dependencies
        run: pnpm install --dir tools/harbor/collector

      - name: Collect skills from org repositories
        id: collect
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
        run: pnpm --dir tools/harbor/collector exec harbor collect --project-root "$GITHUB_WORKSPACE"

      - name: Capture collect id
        id: collect_id
        if: ${{ steps.collect.outcome == 'success' }}
        run: |
          collect_id="$(grep -m1 '^  collect_id:' data/collects.yaml | awk '{print $2}')"
          if [ -z "$collect_id" ]; then
            echo "collect_id not found in data/collects.yaml" >&2
            exit 1
          fi
          echo "collect_id=$collect_id" >> "$GITHUB_OUTPUT"

      - name: Upload collect data artifact
        if: ${{ steps.collect.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: harbor-data-collected
          path: data
          retention-days: 1

      - name: Fail when collect reports blocking issues
        if: ${{ steps.collect.outcome != 'success' }}
        run: exit 1

  post_collect:
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install post-collect dependencies
        run: pnpm install --dir tools/harbor/post-collect

      - name: Restore collected data artifact
        uses: actions/download-artifact@v4
        with:
          name: harbor-data-collected
          path: .harbor-artifacts/collected

      - name: Restore collected data directory
        run: |
          rm -rf data
          if [ -d ".harbor-artifacts/collected/data" ]; then
            mv .harbor-artifacts/collected/data ./data
          else
            mkdir -p data
            cp -R .harbor-artifacts/collected/. ./data/
          fi

      - name: Run post-collect plugins
        id: post_collect
        continue-on-error: true
        env:
          GH_ORG: ${{ vars.GH_ORG }}
        run: pnpm --dir tools/harbor/post-collect exec harbor post-collect --project-root "$GITHUB_WORKSPACE" --collect-id "${{ needs.collect.outputs.collect_id }}"

      - name: Upload final data artifact
        if: ${{ steps.post_collect.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: harbor-data-final
          path: data
          retention-days: 1

      - name: Fail when post-collect reports blocking issues
        if: ${{ steps.post_collect.outcome != 'success' }}
        run: exit 1

  commit:
    runs-on: ubuntu-latest
    needs: post_collect
    steps:
      - uses: actions/checkout@v6
      - name: Restore final data artifact
        uses: actions/download-artifact@v4
        with:
          name: harbor-data-final
          path: .harbor-artifacts/final

      - name: Restore final data directory
        run: |
          rm -rf data
          if [ -d ".harbor-artifacts/final/data" ]; then
            mv .harbor-artifacts/final/data ./data
          else
            mkdir -p data
            cp -R .harbor-artifacts/final/. ./data/
          fi
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update skill catalog data"
            git push
          fi

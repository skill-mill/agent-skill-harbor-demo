name: DeployGitHubPages

on:
  # Enable workflow_run in only one of deploy-github-pages.yml or deploy-cloudflare-pages.yml.
  # workflow_run:
  #   workflows: ['CollectSkills']
  #   types: [completed]
  #   branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: npx harbor build --base=/${{ github.event.repository.name }}
        # For local development (source repo), use instead:
        # run: pnpm build

      - name: Create Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory build \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

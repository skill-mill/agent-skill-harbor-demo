collector:
  exclude_forks: true # skip forked repositories when collecting
  excluded_repos: # repository names to skip when collecting
    - agent-skill-porter
    - agent-skill-harbor
    - agent-skill-harbor-demo
    - sk-azure-integration
    - sk-code-quality
    - sk-creative-tools
    - sk-data-pipeline
    - sk-database-patterns
    - sk-doc-tools
    - sk-mcp-toolkit
    - sk-onboarding-kit
    - sk-platform-sdk
    - sk-security-playbook
    - sk-video-production
  include_origin_repos: true # collect public repositories referenced by _from (1 level, deduped by owner/repo)
  # included_extra_repos: # additional repositories to collect by URL
  #   - https://github.com/owner/repo
  history_limit: 50 # max entries kept in collects.yaml (0 = unlimited)

post_collect:
  plugins:
    ######## Drift Detect - builtin plugin ########
    - id: builtin.detect-drift
      short_label: Drift

    ######## Audit Skill Scanner - builtin plugin ########
    # Run `harbor setup builtin.audit-skill-scanner` first.
    # Then run `pip install -r collector/plugins/builtin.audit-skill-scanner/requirements.txt`.
    # then uncomment the line below.
    # - id: builtin.audit-skill-scanner
    #   short_label: Scanner
    #   config:
    #     command: skill-scanner
    #     options: --policy balanced

    ######## Audit Promptfoo Security - builtin plugin ########
    # Run `harbor setup builtin.audit-promptfoo-security` first.
    # Then run `pnpm install --dir collector/plugins/builtin.audit-promptfoo-security`.
    # Then uncomment the line below.
    #   - id: builtin.audit-promptfoo-security
    #     short_label: Security
    #     config:
    #       model: openai:gpt-5
    #       vulnerabilities:
    #         - prompt-injection
    #         - prompt-extraction
    #         - jailbreak
    #         - policy-violation
    #       risk_threshold: 1
    #       critical_threshold: 3

    ######## Notify Slack - builtin plugin ########
    # Additional setup files is not needed in this plugin.
    # Just uncomment the line below, then set HARBOR_SLACK_WEBHOOK_URL in .env or CI secrets.
    #   - id: builtin.notify-slack
    #     short_label: Slack
    #     config:
    #       disable_send: false
    #       use_debug_message: false
    #       highlight_intents:
    #         - warn
    #         - danger

    ######## Exmpel - user defined plugin ########
    # Generate the example plugin first: harbor setup example-user-defined-plugin
    # Then uncomment the line below.
    #   - id: example-user-defined-plugin
    #     short_label: Example

catalog:
  skill:
    fresh_period_days: 30 # 0 = disable "New" badge



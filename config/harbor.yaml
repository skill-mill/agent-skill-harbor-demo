collector:
  exclude_forks: true # skip forked repositories when collecting
  excluded_repos: # repository names to skip when collecting
    - agent-skill-porter
    - agent-skill-harbor
    - agent-skill-harbor-demo
    # - sk-azure-integration
    # - sk-code-quality
    # - sk-creative-tools
    # - sk-data-pipeline
    # - sk-database-patterns
    # - sk-doc-tools
    # - sk-mcp-toolkit
    # - sk-onboarding-kit
    # - sk-platform-sdk
    # - sk-security-playbook
    # - sk-video-production
  include_origin_repos: true # collect public repositories referenced by _from (1 level, deduped by owner/repo)
  # included_extra_repos: # additional repositories to collect by URL
  #   - https://github.com/owner/repo
  history_limit: 50 # max entries kept in collects.yaml (0 = unlimited)

post_collect:
  plugins:
    - id: builtin.detect-drift
      short_label: Drift
    #   - id: builtin.audit-promptfoo-security
    #     short_label: Security
    #     config:
    #       model: openai:gpt-5
    #       vulnerabilities:
    #         - prompt-injection
    #         - prompt-extraction
    #         - jailbreak
    #         - policy-violation
    #       risk_threshold: 1
    #       critical_threshold: 3
    - id: builtin.audit-static
      short_label: Audit
    - id: sample_plugin
      short_label: Sample
  # Generate the sample plugin first: harbor gen sample-plugin
  # Then uncomment the line above.

catalog:
  skill:
    fresh_period_days: 30 # 0 = disable "New" badge

ui:
  title: Agent Skill Harbor demo
